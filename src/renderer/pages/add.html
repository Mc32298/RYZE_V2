<!DOCTYPE html>
<html>
<head>
  <title>Add Inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- ======================================================================
       STYLES
       ====================================================================== -->
  <style>

    /* ==========================================================================
       BASE
       ========================================================================== */

    body { 
      background: transparent !important; 
      color: #f2f2f7; 
      font-family: -apple-system, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      overflow: hidden;
    }

    /* ==========================================================================
       FAKE SHADOW WRAPPER
       ========================================================================== */

    .wrapper {
      position: relative;
    }

    /* ==========================================================================
       MODAL
       ========================================================================== */

    .modal-box {
      background: #2c2c2e;
      padding: 30px; 
      border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center; 
      width: 300px;
      position: relative;
      z-index: 1;
    }

    h2 { 
      font-weight: 500; 
      margin: 0 0 25px 0;
      font-size: 22px; 
    }

    .cancel {
      margin-top: 20px; 
      font-size: 13px; 
      color: #666; 
      cursor: pointer;
    }

    /* ==========================================================================
       TUTORIAL TIP
       ========================================================================== */

    #tutorial-tip {
      display: none;
      background: #0A84FF;
      color: white;
      padding: 12px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 20px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9) translateY(-10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* ==========================================================================
       SERVICE OPTIONS
       ========================================================================== */

    .options { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 10px; 
    }

    .provider-btn { 
      background: rgba(255, 255, 255, 0.1); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      color: white; 
      padding: 14px; 
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .provider-btn:hover { 
      background: rgba(255, 255, 255, 0.15); 
      border-color: #0A84FF; 
    }
    .provider-btn .material-symbols-outlined {
      font-size: 20px;
    }

    /* ==========================================================================
       NAMING STEP
       ========================================================================== */

    #step-naming { 
      display: none; 
    }

    input {
      width: 100%; 
      background: #1c1c1e; 
      border: 1px solid #48484a; 
      border-radius: 10px;
      padding: 12px; 
      color: white; 
      font-size: 16px; 
      margin-bottom: 12px; 
      box-sizing: border-box; 
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus { 
      border-color: #0A84FF; 
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.3);
    }

    .btn-confirm { 
      background: #0A84FF; 
      border: none; 
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      width: 100%; 
      color: white; 
      font-weight: 700; 
    }

    .btn-confirm:hover {
      background: #007aff;
    }
    /* Inside the style block in add.html */
.provider-btn.microsoft {
  background: #ffffff;
  color: #000000;
  border: none;
}

.provider-btn.microsoft:hover {
  background: #f2f2f2;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

  </style>
</head>
<body>

  <!-- ======================================================================
       MODAL
       ====================================================================== -->
  <div class="wrapper">
    <div class="modal-box">

      <!-- Tutorial Tip -->
      <div id="tutorial-tip">Step 1: Pick your mail provider below!</div>

      <!-- Step 1: Select service -->
      <div id="step-select">
  <h2>Add Inbox</h2>
  <div class="options">
          <button class="provider-btn microsoft" onclick="startMicrosoftAuth()">
  <svg width="20" height="20" viewBox="0 0 23 23">
    <path fill="#f3f3f3" d="M0 0h11v11H0z"/><path fill="#f3f3f3" d="M12 0h11v11H12z"/><path fill="#f3f3f3" d="M0 12h11v11H0z"/><path fill="#f3f3f3" d="M12 12h11v11H12z"/>
    <path fill="#f35325" d="M1 1h9v9H1z"/><path fill="#81bc06" d="M13 1h9v9H13z"/><path fill="#05a6f0" d="M1 13h9v9H1z"/><path fill="#ffba08" d="M13 13h9v9H13z"/>
  </svg>
  Sign in with Microsoft
</button>
    <button class="provider-btn" onclick="goToNaming('gmail')">
      <span class="material-symbols-outlined">mail</span> Gmail (App Password)
    </button>
  </div>
</div>

      <!-- Step 2: Name the inbox -->
      <div id="step-naming">
        <h2 id="naming-title">Account Details</h2>
        
        <input type="text" id="acc-name" placeholder="Account Name (e.g., Work)" maxlength="20">
        
        <input type="email" id="acc-email" placeholder="Email Address">
        <input type="password" id="acc-pass" placeholder="16-Digit App Password">
        
        <button class="btn-confirm" onclick="finish()">Connect Inbox</button>
      </div>

      <div class="cancel" onclick="window.close()">Cancel</div>

    </div>
  </div>

  <!-- ======================================================================
       SCRIPT
       ====================================================================== -->
  <script>
    // --- State ---
    let selectedType = '';

    const params = new URLSearchParams(window.location.search);
    const isTutorial = params.get('tutorial') === 'true';
    const tipElement = document.getElementById('tutorial-tip');

    function startMicrosoftAuth() {
      // Tell the main process to start the Microsoft Login
      window.mailAPI.startOAuth('outlook');
      window.close();
    }

    // --- Init ---
    if (isTutorial) tipElement.style.display = 'block';

    // --- Step 1: Pick service ---
    function goToNaming(type) {
      selectedType = type;
      document.getElementById('step-select').style.display = 'none';
      document.getElementById('step-naming').style.display = 'block';

      if (isTutorial) {
        tipElement.innerText = "Step 2: Give it a name so you can tell your accounts apart!";
      }

      const input = document.getElementById('acc-name');
      input.value = type.charAt(0).toUpperCase() + type.slice(1);
      input.focus();
    }

    // --- Step 2: Confirm ---
    // --- Step 2: Confirm ---
    function finish() {
      const name = document.getElementById('acc-name').value || selectedType;
      const email = document.getElementById('acc-email').value;
      const password = document.getElementById('acc-pass').value;

      if (!email || !password) {
        alert("Please enter both your email and app password!");
        return;
      }

      // Send the credentials securely to the main process
      window.mailAPI.addService({ 
        type: selectedType, 
        name: name,
        email: email,
        password: password.replace(/\s+/g, '') // Strip spaces just in case!
      });
      window.close();
    }
  </script>

</body>
</html>
